name: AppsSwitch
options:
  bundleIdPrefix: com.vincent
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "KFLACS69T9"
    ENABLE_HARDENED_RUNTIME: YES
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  AppsSwitchCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/AppsSwitchCore
    info:
      path: Sources/AppsSwitchCore/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincent.AppsSwitchCore
        PRODUCT_NAME: AppsSwitchCore
        CODE_SIGN_IDENTITY: "-"
        DEFINES_MODULE: NO

  AppsSwitchUI:
    type: framework
    platform: macOS
    sources:
      - path: Sources/AppsSwitchUI
    dependencies:
      - target: AppsSwitchCore
    info:
      path: Sources/AppsSwitchUI/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincent.AppsSwitchUI
        PRODUCT_NAME: AppsSwitchUI
        CODE_SIGN_IDENTITY: "-"
        DEFINES_MODULE: NO

  AppsSwitch:
    type: application
    platform: macOS
    sources:
      - path: Sources/AppsSwitch
      - path: Sources/AppsSwitch/Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - target: AppsSwitchCore
        embed: true
      - target: AppsSwitchUI
        embed: true
    info:
      path: Sources/AppsSwitch/Info.plist
      properties:
        CFBundleDisplayName: AppsSwitch
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "26.0"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: "© 2026 Vincent Lauriat"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincent.AppsSwitch
        PRODUCT_NAME: AppsSwitch
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Developer ID Application"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_ENTITLEMENTS: Sources/AppsSwitch/AppsSwitch.entitlements

  AppsSwitchCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/AppsSwitchCoreTests
    dependencies:
      - target: AppsSwitchCore
    info:
      path: Tests/AppsSwitchCoreTests/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincent.AppsSwitchCoreTests
        CODE_SIGN_IDENTITY: "-"

schemes:
  AppsSwitchCoreTests:
    build:
      targets:
        AppsSwitchCoreTests: [test]
    test:
      targets:
        - AppsSwitchCoreTests
